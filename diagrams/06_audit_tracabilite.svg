  <text x="831" y="190" text-anchor="middle" fill="#ef5350" font-size="9">👑 SuperAdmin — Lecture seule</text>
  <rect x="906" y="176" width="148" height="22" rx="4" fill="#0d1b2e" stroke="#546e7a" stroke-width="1"/>
  <text x="980" y="190" text-anchor="middle" fill="#546e7a" font-size="9">❌ Admin — Aucun accès</text>
  <rect x="766" y="202" width="148" height="22" rx="4" fill="#0d1b2e" stroke="#546e7a" stroke-width="1"/>
  <text x="840" y="216" text-anchor="middle" fill="#546e7a" font-size="9">❌ Distributeur — Aucun accès</text>
  <text x="910" y="232" text-anchor="middle" fill="#a5d6a7" font-size="9">Aucune modification possible pour personne</text>

  <!-- Retention -->
  <rect x="756" y="250" width="308" height="80" rx="8" fill="#1b2e1b" stroke="#ffa726" stroke-width="1"/>
  <text x="910" y="270" text-anchor="middle" fill="#ffa726" font-size="11" font-weight="bold">📅 Rétention des logs</text>
  <text x="910" y="288" text-anchor="middle" fill="#ffcc80" font-size="9">Conservation : 5 ans minimum</text>
  <text x="910" y="303" text-anchor="middle" fill="#ffcc80" font-size="9">Archivage automatique chiffré AES-256</text>
  <text x="910" y="318" text-anchor="middle" fill="#ffcc80" font-size="9">Backup hors-site sécurisé · Redondance</text>

  <!-- Alerts -->
  <rect x="756" y="344" width="308" height="80" rx="8" fill="#1b2e1b" stroke="#ef5350" stroke-width="1"/>
  <text x="910" y="364" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="bold">🚨 Alertes automatiques</text>
  <text x="910" y="382" text-anchor="middle" fill="#ef9a9a" font-size="9">5+ échecs auth → Alerte + blocage IP</text>
  <text x="910" y="397" text-anchor="middle" fill="#ef9a9a" font-size="9">Accès hors plage horaire → Alerte</text>
  <text x="910" y="412" text-anchor="middle" fill="#ef9a9a" font-size="9">Anomalie géographique → Alerte</text>

  <!-- Export -->
  <rect x="756" y="438" width="308" height="80" rx="8" fill="#1b2e1b" stroke="#4fc3f7" stroke-width="1"/>
  <text x="910" y="458" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold">📤 Export &amp; Compliance</text>
  <text x="910" y="476" text-anchor="middle" fill="#90caf9" font-size="9">Export CSV/JSON chiffré pour audit externe</text>
  <text x="910" y="491" text-anchor="middle" fill="#90caf9" font-size="9">Compatible RGPD · Audit humanitaire</text>
  <text x="910" y="506" text-anchor="middle" fill="#90caf9" font-size="9">Rapport automatique hebdomadaire</text>

  <!-- Footer -->
  <rect x="20" y="588" width="1060" height="55" rx="10" fill="#0d1b2e" stroke="#ffa726" stroke-width="1" opacity="0.9"/>
  <text x="550" y="608" text-anchor="middle" fill="#ffa726" font-size="12" font-weight="bold">Principe fondamental :</text>
  <text x="700" y="608" text-anchor="middle" fill="#ffcc80" font-size="12">tout ce qui se passe dans NAJDA laisse une trace immuable</text>
  <text x="550" y="628" text-anchor="middle" fill="#90caf9" font-size="10">Chaîne de logs · Signature RSA · Hash SHA-256 · Horodatage UTC · Non répudiation garantie</text>
  <text x="550" y="641" text-anchor="middle" fill="#546e7a" font-size="9">NAJDA © 2026 — Audit trail conforme aux exigences humanitaires internationales</text>
</svg>
