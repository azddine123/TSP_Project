  <rect x="740" y="90" width="340" height="480" rx="14" fill="#0d1b2e" stroke="#66bb6a" stroke-width="2"/>
  <rect x="740" y="90" width="340" height="44" rx="14" fill="#1b2e1b"/>
  <text x="910" y="110" text-anchor="middle" fill="#66bb6a" font-size="13" font-weight="bold">🔍 Accès &amp; Consultation</text>
