<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="820" fill="#0a0f1e"/>

  <!-- Title -->
  <rect x="200" y="18" width="800" height="52" rx="10" fill="#0d2137" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="600" y="40" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="bold">🛡️</text>
  <text x="620" y="40" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="bold">Architecture Sécurisée de NAJDA</text>
  <text x="600" y="58" text-anchor="middle" fill="#90caf9" font-size="11">Plateforme intelligente de distribution humanitaire</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ZONE UTILISATEURS -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="90" width="220" height="540" rx="12" fill="#0d1b2e" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="130" y="112" text-anchor="middle" fill="#4fc3f7" font-size="12" font-weight="bold">👥 ACTEURS</text>

  <!-- SuperAdmin -->
  <rect x="40" y="125" width="180" height="100" rx="10" fill="#1a3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="130" y="148" text-anchor="middle" font-size="22">🖥️</text>
  <text x="130" y="168" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">SuperAdmin</text>
  <text x="130" y="184" text-anchor="middle" fill="#90caf9" font-size="10">Interface Web</text>
  <text x="130" y="198" text-anchor="middle" fill="#90caf9" font-size="10">Gestion globale</text>
  <rect x="50" y="210" width="160" height="6" rx="3" fill="#4fc3f7" opacity="0.2"/>

  <!-- Admin Entrepôt -->
  <rect x="40" y="245" width="180" height="100" rx="10" fill="#1a3a5c" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="130" y="268" text-anchor="middle" font-size="22">🖥️</text>
  <text x="130" y="288" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Admin Entrepôt</text>
  <text x="130" y="304" text-anchor="middle" fill="#90caf9" font-size="10">Interface Web</text>
  <text x="130" y="318" text-anchor="middle" fill="#90caf9" font-size="10">Gestion locale</text>

  <!-- Distributeur Mobile -->
  <rect x="40" y="365" width="180" height="110" rx="10" fill="#1a3a5c" stroke="#ffa726" stroke-width="1.5"/>
  <text x="130" y="390" text-anchor="middle" font-size="22">📱</text>
  <text x="130" y="412" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Distributeur</text>
  <text x="130" y="428" text-anchor="middle" fill="#ffd54f" font-size="10">App Mobile</text>
  <text x="130" y="443" text-anchor="middle" fill="#ffd54f" font-size="10">Biométrie + PIN</text>
  <rect x="50" y="455" width="160" height="14" rx="4" fill="#1b2e1b" stroke="#66bb6a" stroke-width="1"/>
  <text x="130" y="466" text-anchor="middle" fill="#66bb6a" font-size="9">📴 Mode Offline</text>

  <!-- Offline zone -->
  <rect x="40" y="495" width="180" height="110" rx="10" fill="#1e1a00" stroke="#ffa726" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="515" text-anchor="middle" fill="#ffa726" font-size="11" font-weight="bold">📴 Offline Storage</text>
  <rect x="55" y="524" width="150" height="30" rx="6" fill="#2e2000" stroke="#ffa726" stroke-width="1"/>
  <text x="130" y="539" text-anchor="middle" fill="#ffd54f" font-size="10">💾 SQLite Chiffré</text>
  <text x="130" y="553" text-anchor="middle" fill="#ffd54f" font-size="9">Données locales protégées</text>
  <rect x="55" y="560" width="150" height="30" rx="6" fill="#2e2000" stroke="#ffa726" stroke-width="1"/>
  <text x="130" y="575" text-anchor="middle" fill="#ffd54f" font-size="10">🔄 Sync Engine</text>
  <text x="130" y="589" text-anchor="middle" fill="#ffd54f" font-size="9">Sync sécurisée dès réseau</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- INTERNET / TLS -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="280" y="170" width="140" height="340" rx="12" fill="#051428" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="350" y="192" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold">🌐 INTERNET</text>
  <rect x="295" y="200" width="110" height="70" rx="8" fill="#0d2137" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="350" y="224" text-anchor="middle" font-size="18">🔒</text>
  <text x="350" y="244" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold">HTTPS</text>
  <text x="350" y="258" text-anchor="middle" fill="#90caf9" font-size="10">TLS 1.3</text>

  <rect x="295" y="285" width="110" height="50" rx="8" fill="#0d2137" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="350" y="305" text-anchor="middle" fill="#66bb6a" font-size="10" font-weight="bold">🔑 JWT Token</text>
  <text x="350" y="322" text-anchor="middle" fill="#a5d6a7" font-size="9">Auth par token</text>

  <rect x="295" y="348" width="110" height="50" rx="8" fill="#0d2137" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="350" y="368" text-anchor="middle" fill="#ce93d8" font-size="10" font-weight="bold">🛡️ Cert SSL</text>
  <text x="350" y="385" text-anchor="middle" fill="#ce93d8" font-size="9">Certificat vérifié</text>

  <rect x="295" y="410" width="110" height="50" rx="8" fill="#0d2137" stroke="#ffa726" stroke-width="1.5"/>
  <text x="350" y="430" text-anchor="middle" fill="#ffcc80" font-size="10" font-weight="bold">🚫 Rate Limit</text>
  <text x="350" y="447" text-anchor="middle" fill="#ffcc80" font-size="9">Anti-bruteforce</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BACKEND -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="460" y="90" width="360" height="580" rx="12" fill="#0d1f0d" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="640" y="112" text-anchor="middle" fill="#66bb6a" font-size="12" font-weight="bold">⚙️ BACKEND SÉCURISÉ — API NestJS</text>

  <!-- API Gateway -->
  <rect x="480" y="125" width="320" height="70" rx="10" fill="#1b2e1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="640" y="148" text-anchor="middle" font-size="18">⚡</text>
  <text x="680" y="148" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">API Gateway</text>
  <text x="640" y="165" text-anchor="middle" fill="#a5d6a7" font-size="10">Routing sécurisé · Validation des entrées · Rate Limiting</text>
  <text x="640" y="181" text-anchor="middle" fill="#a5d6a7" font-size="10">Protection OWASP · Firewall applicatif</text>

  <!-- Auth Service -->
  <rect x="480" y="215" width="145" height="100" rx="10" fill="#1b2e1b" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="552" y="238" text-anchor="middle" font-size="18">🔑</text>
  <text x="552" y="258" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Auth Service</text>
  <text x="552" y="273" text-anchor="middle" fill="#90caf9" font-size="9">JWT / OAuth2</text>
  <text x="552" y="286" text-anchor="middle" fill="#90caf9" font-size="9">BCrypt (passwords)</text>
  <text x="552" y="299" text-anchor="middle" fill="#90caf9" font-size="9">Biométrie mobile</text>

  <!-- RBAC -->
  <rect x="635" y="215" width="165" height="100" rx="10" fill="#1b2e1b" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="717" y="238" text-anchor="middle" font-size="18">🛂</text>
  <text x="717" y="258" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">RBAC</text>
  <text x="717" y="273" text-anchor="middle" fill="#ce93d8" font-size="9">Contrôle d'accès par rôle</text>
  <text x="717" y="286" text-anchor="middle" fill="#ce93d8" font-size="9">SuperAdmin / Admin</text>
  <text x="717" y="299" text-anchor="middle" fill="#ce93d8" font-size="9">Distributeur</text>

  <!-- Business Logic -->
  <rect x="480" y="335" width="320" height="80" rx="10" fill="#1b2e1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="640" y="358" text-anchor="middle" font-size="18">🧠</text>
  <text x="665" y="358" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Logique Métier</text>
  <text x="640" y="375" text-anchor="middle" fill="#a5d6a7" font-size="10">Missions · Stocks · Tournées · Distributions</text>
  <text x="640" y="391" text-anchor="middle" fill="#a5d6a7" font-size="10">Alertes · Optimisation algorithmes TSP</text>

  <!-- Audit Logger -->
  <rect x="480" y="435" width="320" height="90" rx="10" fill="#1b2e1b" stroke="#ffa726" stroke-width="1.5"/>
  <text x="640" y="458" text-anchor="middle" font-size="18">📋</text>
  <text x="665" y="458" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Audit Logger</text>
  <text x="640" y="474" text-anchor="middle" fill="#ffcc80" font-size="10">Journalisation de toutes les actions</text>
  <text x="640" y="489" text-anchor="middle" fill="#ffcc80" font-size="10">Logs immuables · Horodatage cryptographique</text>
  <text x="640" y="504" text-anchor="middle" fill="#ffa726" font-size="9">🔐 Signature numérique · Intégrité garantie</text>
  <rect x="490" y="515" width="300" height="5" rx="2" fill="#ffa726" opacity="0.3"/>

  <!-- Encryption Layer -->
  <rect x="480" y="545" width="320" height="60" rx="10" fill="#1b2e1b" stroke="#ef5350" stroke-width="1.5"/>
  <text x="640" y="568" text-anchor="middle" font-size="18">🔐</text>
  <text x="665" y="568" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Couche Chiffrement</text>
  <text x="640" y="585" text-anchor="middle" fill="#ef9a9a" font-size="10">Chiffrement des données sensibles · AES-256</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- DATABASE -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="860" y="90" width="310" height="580" rx="12" fill="#1a0a2e" stroke="#ab47bc" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1015" y="112" text-anchor="middle" fill="#ab47bc" font-size="12" font-weight="bold">🗄️ BASE DE DONNÉES SÉCURISÉE</text>

  <!-- PostgreSQL -->
  <rect x="880" y="125" width="270" height="130" rx="10" fill="#2e1b2e" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="1015" y="152" text-anchor="middle" font-size="22">🐘</text>
  <text x="1015" y="175" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">PostgreSQL</text>
  <text x="1015" y="192" text-anchor="middle" fill="#ce93d8" font-size="10">Données chiffrées au repos</text>
  <rect x="895" y="202" width="240" height="20" rx="4" fill="#1a0a2e" stroke="#ab47bc" stroke-width="1"/>
  <text x="1015" y="216" text-anchor="middle" fill="#ab47bc" font-size="10" font-weight="bold">AES-256 Encryption at Rest</text>
  <text x="1015" y="243" text-anchor="middle" fill="#ce93d8" font-size="9">Accès uniquement via Backend · Pas d'accès direct</text>

  <!-- HSM -->
  <rect x="880" y="275" width="270" height="130" rx="10" fill="#2e1b2e" stroke="#ef5350" stroke-width="1.5"/>
  <text x="1015" y="302" text-anchor="middle" font-size="22">🔐</text>
  <text x="1015" y="325" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">HSM</text>
  <text x="1015" y="342" text-anchor="middle" fill="#ef9a9a" font-size="10">Hardware Security Module</text>
  <text x="1015" y="357" text-anchor="middle" fill="#ef9a9a" font-size="10">Gestion sécurisée des clés de chiffrement</text>
  <rect x="895" y="367" width="240" height="20" rx="4" fill="#1a0a2e" stroke="#ef5350" stroke-width="1"/>
  <text x="1015" y="381" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="bold">Clés inviolables · Boîtier physique sécurisé</text>
  <text x="1015" y="395" text-anchor="middle" fill="#ef9a9a" font-size="9">FIPS 140-2 Level 3</text>

  <!-- Backup -->
  <rect x="880" y="425" width="270" height="80" rx="10" fill="#2e1b2e" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="1015" y="448" text-anchor="middle" font-size="18">💽</text>
  <text x="1015" y="468" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Backup Chiffré</text>
  <text x="1015" y="483" text-anchor="middle" fill="#a5d6a7" font-size="10">Sauvegardes automatiques · AES-256</text>
  <text x="1015" y="498" text-anchor="middle" fill="#a5d6a7" font-size="9">Réplication sécurisée</text>

  <!-- Monitoring -->
  <rect x="880" y="525" width="270" height="80" rx="10" fill="#2e1b2e" stroke="#ffa726" stroke-width="1.5"/>
  <text x="1015" y="548" text-anchor="middle" font-size="18">📊</text>
  <text x="1015" y="568" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Monitoring</text>
  <text x="1015" y="583" text-anchor="middle" fill="#ffcc80" font-size="10">Surveillance en temps réel</text>
  <text x="1015" y="598" text-anchor="middle" fill="#ffcc80" font-size="9">Alertes d'intrusion · Anomalies</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ARROWS -->
  <!-- ═══════════════════════════════════════════ -->
  <!-- SuperAdmin → TLS -->
  <line x1="220" y1="175" x2="280" y2="230" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Admin → TLS -->
  <line x1="220" y1="295" x2="280" y2="260" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Distributeur → TLS -->
  <line x1="220" y1="415" x2="280" y2="360" stroke="#ffa726" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- TLS → API Gateway -->
  <line x1="420" y1="260" x2="478" y2="185" stroke="#4fc3f7" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="428" y="215" width="40" height="16" rx="3" fill="#0a0f1e"/>
  <text x="448" y="226" text-anchor="middle" fill="#4fc3f7" font-size="9" font-weight="bold">HTTPS</text>

  <!-- API Gateway → Auth -->
  <line x1="640" y1="195" x2="552" y2="213" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- API Gateway → RBAC -->
  <line x1="640" y1="195" x2="717" y2="213" stroke="#ab47bc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <!-- Auth → Business -->
  <line x1="552" y1="315" x2="580" y2="333" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- RBAC → Business -->
  <line x1="717" y1="315" x2="700" y2="333" stroke="#ab47bc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <!-- Business → Audit -->
  <line x1="640" y1="415" x2="640" y2="433" stroke="#ffa726" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- Business → Encrypt -->
  <line x1="640" y1="415" x2="680" y2="543" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- Backend → PostgreSQL -->
  <line x1="820" y1="415" x2="878" y2="200" stroke="#ab47bc" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="830" y="300" width="48" height="16" rx="3" fill="#0a0f1e"/>
  <text x="854" y="311" text-anchor="middle" fill="#ab47bc" font-size="9" font-weight="bold">SQL+TLS</text>

  <!-- PostgreSQL ↔ HSM -->
  <line x1="1015" y1="255" x2="1015" y2="273" stroke="#ef5350" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Offline ↔ Distributeur -->
  <line x1="130" y1="495" x2="130" y2="477" stroke="#ffa726" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-orange)"/>

  <!-- LEGEND ARROW MARKERS -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4fc3f7"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#66bb6a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ab47bc"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffa726"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef5350"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="660" width="1160" height="145" rx="10" fill="#0d1b2e" stroke="#4fc3f7" stroke-width="1" opacity="0.9"/>
  <text x="600" y="682" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="bold">📖 LÉGENDE TECHNIQUE</text>

  <!-- TLS -->
  <rect x="40" y="695" width="8" height="8" rx="2" fill="#4fc3f7"/>
  <text x="55" y="704" fill="#4fc3f7" font-size="11" font-weight="bold">TLS 1.3</text>
  <text x="55" y="718" fill="#90caf9" font-size="10">Transport Layer Security — chiffre toutes les communications réseau</text>

  <!-- AES -->
  <rect x="40" y="730" width="8" height="8" rx="2" fill="#ab47bc"/>
  <text x="55" y="739" fill="#ab47bc" font-size="11" font-weight="bold">AES-256</text>
  <text x="55" y="753" fill="#ce93d8" font-size="10">Advanced Encryption Standard — chiffre les données stockées en base</text>

  <!-- JWT -->
  <rect x="340" y="695" width="8" height="8" rx="2" fill="#66bb6a"/>
  <text x="355" y="704" fill="#66bb6a" font-size="11" font-weight="bold">JWT</text>
  <text x="355" y="718" fill="#a5d6a7" font-size="10">JSON Web Token — prouve l'identité à chaque requête sans session</text>

  <!-- HSM -->
  <rect x="340" y="730" width="8" height="8" rx="2" fill="#ef5350"/>
  <text x="355" y="739" fill="#ef5350" font-size="11" font-weight="bold">HSM</text>
  <text x="355" y="753" fill="#ef9a9a" font-size="10">Hardware Security Module — boîtier physique inviolable pour les clés</text>

  <!-- RBAC -->
  <rect x="640" y="695" width="8" height="8" rx="2" fill="#ffa726"/>
  <text x="655" y="704" fill="#ffa726" font-size="11" font-weight="bold">RBAC</text>
  <text x="655" y="718" fill="#ffcc80" font-size="10">Role-Based Access Control — chaque utilisateur voit uniquement son périmètre</text>

  <!-- BCrypt -->
  <rect x="640" y="730" width="8" height="8" rx="2" fill="#4fc3f7"/>
  <text x="655" y="739" fill="#4fc3f7" font-size="11" font-weight="bold">BCrypt</text>
  <text x="655" y="753" fill="#90caf9" font-size="10">Hachage des mots de passe — jamais stockés en clair dans la base</text>

  <!-- Footer -->
  <text x="600" y="790" text-anchor="middle" fill="#546e7a" font-size="10">NAJDA © 2026 — Plateforme de distribution humanitaire intelligente et sécurisée</text>
</svg>
