<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="700" fill="#0a0f1e"/>

  <!-- Title -->
  <rect x="150" y="18" width="800" height="48" rx="10" fill="#0d2137" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="550" y="40" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="bold">🔄 Flux de Communication Sécurisé — NAJDA</text>
  <text x="550" y="56" text-anchor="middle" fill="#90caf9" font-size="11">Séquence complète d'une requête authentifiée</text>

  <!-- Steps vertical line -->
  <line x1="90" y1="100" x2="90" y2="640" stroke="#1a3a5c" stroke-width="2"/>

  <!-- ─── STEP 1 ─── -->
  <circle cx="90" cy="130" r="16" fill="#4fc3f7"/>
  <text x="90" y="135" text-anchor="middle" fill="#0a0f1e" font-size="12" font-weight="bold">1</text>
  <rect x="120" y="110" width="940" height="55" rx="8" fill="#0d1b2e" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="140" y="132" fill="#4fc3f7" font-size="13" font-weight="bold">Authentification</text>
  <text x="140" y="150" fill="#90caf9" font-size="11">L'utilisateur saisit ses identifiants (email + mot de passe / biométrie sur mobile)</text>
  <rect x="900" y="118" width="150" height="39" rx="6" fill="#1a3a5c" stroke="#4fc3f7" stroke-width="1"/>
  <text x="975" y="134" text-anchor="middle" fill="#4fc3f7" font-size="10" font-weight="bold">🔐 BCrypt</text>
  <text x="975" y="148" text-anchor="middle" fill="#90caf9" font-size="9">Hash vérifié côté serveur</text>

  <!-- ─── STEP 2 ─── -->
  <circle cx="90" cy="205" r="16" fill="#66bb6a"/>
  <text x="90" y="210" text-anchor="middle" fill="#0a0f1e" font-size="12" font-weight="bold">2</text>
  <rect x="120" y="185" width="940" height="55" rx="8" fill="#0d1b2e" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="140" y="207" fill="#66bb6a" font-size="13" font-weight="bold">Chiffrement de la requête</text>
  <text x="140" y="225" fill="#a5d6a7" font-size="11">La requête est encapsulée dans TLS 1.3 — chiffrement bout-en-bout sur le réseau</text>
  <rect x="900" y="193" width="150" height="39" rx="6" fill="#1b2e1b" stroke="#66bb6a" stroke-width="1"/>
  <text x="975" y="209" text-anchor="middle" fill="#66bb6a" font-size="10" font-weight="bold">🔒 TLS 1.3</text>
  <text x="975" y="223" text-anchor="middle" fill="#a5d6a7" font-size="9">Certificat SSL validé</text>

  <!-- ─── STEP 3 ─── -->
  <circle cx="90" cy="280" r="16" fill="#ab47bc"/>
  <text x="90" y="285" text-anchor="middle" fill="#0a0f1e" font-size="12" font-weight="bold">3</text>
  <rect x="120" y="260" width="940" height="55" rx="8" fill="#0d1b2e" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="140" y="282" fill="#ab47bc" font-size="13" font-weight="bold">Vérification du Token JWT</text>
  <text x="140" y="300" fill="#ce93d8" font-size="11">Le backend vérifie la signature JWT — identité confirmée, token non expiré</text>
  <rect x="900" y="268" width="150" height="39" rx="6" fill="#2e1b2e" stroke="#ab47bc" stroke-width="1"/>
  <text x="975" y="284" text-anchor="middle" fill="#ab47bc" font-size="10" font-weight="bold">🔑 JWT Verify</text>
  <text x="975" y="298" text-anchor="middle" fill="#ce93d8" font-size="9">Signature RS256</text>

  <!-- ─── STEP 4 ─── -->
  <circle cx="90" cy="355" r="16" fill="#ffa726"/>
  <text x="90" y="360" text-anchor="middle" fill="#0a0f1e" font-size="12" font-weight="bold">4</text>
  <rect x="120" y="335" width="940" height="55" rx="8" fill="#0d1b2e" stroke="#ffa726" stroke-width="1.5"/>
  <text x="140" y="357" fill="#ffa726" font-size="13" font-weight="bold">Contrôle d'accès RBAC</text>
  <text x="140" y="375" fill="#ffcc80" font-size="11">Le rôle est vérifié — SuperAdmin / Admin Entrepôt / Distributeur ont des droits différents</text>
  <rect x="900" y="343" width="150" height="39" rx="6" fill="#1e1a00" stroke="#ffa726" stroke-width="1"/>
  <text x="975" y="359" text-anchor="middle" fill="#ffa726" font-size="10" font-weight="bold">🛂 RBAC Guard</text>
  <text x="975" y="373" text-anchor="middle" fill="#ffcc80" font-size="9">Permission validée</text>

  <!-- ─── STEP 5 ─── -->
  <circle cx="90" cy="430" r="16" fill="#ef5350"/>
  <text x="90" y="435" text-anchor="middle" fill="#0a0f1e" font-size="12" font-weight="bold">5</text>
  <rect x="120" y="410" width="940" height="55" rx="8" fill="#0d1b2e" stroke="#ef5350" stroke-width="1.5"/>
  <text x="140" y="432" fill="#ef5350" font-size="13" font-weight="bold">Accès à la base de données</text>
  <text x="140" y="450" fill="#ef9a9a" font-size="11">Requête SQL via ORM sécurisé — données déchiffrées AES-256 à la volée par HSM</text>
  <rect x="900" y="418" width="150" height="39" rx="6" fill="#1a0a2e" stroke="#ef5350" stroke-width="1"/>
  <text x="975" y="434" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="bold">🐘 PostgreSQL</text>
  <text x="975" y="448" text-anchor="middle" fill="#ef9a9a" font-size="9">AES-256 + HSM</text>

  <!-- ─── STEP 6 ─── -->
  <circle cx="90" cy="505" r="16" fill="#4fc3f7"/>
  <text x="90" y="510" text-anchor="middle" fill="#0a0f1e" font-size="12" font-weight="bold">6</text>
  <rect x="120" y="485" width="940" height="55" rx="8" fill="#0d1b2e" stroke="#ffa726" stroke-width="1.5"/>
  <text x="140" y="507" fill="#ffa726" font-size="13" font-weight="bold">Journalisation (Audit Log)</text>
  <text x="140" y="525" fill="#ffcc80" font-size="11">Chaque action est enregistrée avec horodatage, utilisateur, IP source et résultat</text>
  <rect x="900" y="493" width="150" height="39" rx="6" fill="#1e1a00" stroke="#ffa726" stroke-width="1"/>
  <text x="975" y="509" text-anchor="middle" fill="#ffa726" font-size="10" font-weight="bold">📋 Audit Log</text>
  <text x="975" y="523" text-anchor="middle" fill="#ffcc80" font-size="9">Immuable + Signé</text>

  <!-- ─── STEP 7 ─── -->
  <circle cx="90" cy="580" r="16" fill="#66bb6a"/>
  <text x="90" y="585" text-anchor="middle" fill="#0a0f1e" font-size="12" font-weight="bold">7</text>
  <rect x="120" y="560" width="940" height="55" rx="8" fill="#0d1b2e" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="140" y="582" fill="#66bb6a" font-size="13" font-weight="bold">Réponse chiffrée retournée</text>
  <text x="140" y="600" fill="#a5d6a7" font-size="11">La réponse est chiffrée TLS avant envoi — données sensibles masquées dans les logs</text>
  <rect x="900" y="568" width="150" height="39" rx="6" fill="#1b2e1b" stroke="#66bb6a" stroke-width="1"/>
  <text x="975" y="584" text-anchor="middle" fill="#66bb6a" font-size="10" font-weight="bold">✅ Réponse OK</text>
  <text x="975" y="598" text-anchor="middle" fill="#a5d6a7" font-size="9">Chiffrée TLS 1.3</text>

  <!-- Footer summary -->
  <rect x="20" y="648" width="1060" height="40" rx="8" fill="#0d1b2e" stroke="#4fc3f7" stroke-width="1" opacity="0.8"/>
  <text x="550" y="664" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold">Résumé :</text>
  <text x="620" y="664" text-anchor="middle" fill="#90caf9" font-size="11">Utilisateur → [TLS] → Auth → [JWT] → RBAC → [AES-256] → DB → [Audit] → [TLS] → Utilisateur</text>
  <text x="550" y="681" text-anchor="middle" fill="#546e7a" font-size="9">NAJDA © 2026 — Chaque requête est sécurisée, authentifiée, autorisée et tracée</text>
</svg>
